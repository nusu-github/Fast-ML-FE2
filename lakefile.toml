name = "Fast-ML-FE2"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["FastMLFE2"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "repl"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "FastMLFE2"
